<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨平台手勢辨識 - 強制後置鏡頭版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #121214;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #1c1c1e;
        }
        .mirror {
            transform: scaleX(-1);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #ffcc00;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <p id="loading">正在深度偵測手機硬體，強行切換後置主鏡頭...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 初始化 MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        function onResults(results) {
            if (loadingText) loadingText.style.display = 'none';

            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        hands.onResults(onResults);

        // 【核心修正】尋找並強行綁定後置鏡頭
        async function startCamera() {
            try {
                // 1. 先隨便要一個基礎權限，讓瀏覽器願意提供「硬體列表」
                const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // 2. 獲取所有鏡頭裝置
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                // 先把剛才暫時開啟的鏡頭關掉
                initialStream.getTracks().forEach(track => track.stop());

                let targetDeviceId = null;
                const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

                if (isMobile) {
                    // 3. 如果是手機，尋找名稱包含 back, environment 或 main 的鏡頭（通常最後一個是主鏡頭）
                    const backCameras = videoDevices.filter(device => 
                        device.label.toLowerCase().includes('back') || 
                        device.label.toLowerCase().includes('environment') ||
                        device.label.toLowerCase().includes('main') ||
                        device.label.toLowerCase().includes('後置')
                    );

                    if (backCameras.length > 0) {
                        // 拿最後一個（通常是高畫質的主鏡頭，前面可能是超廣角或微距）
                        targetDeviceId = backCameras[backCameras.length - 1].deviceId;
                    } else if (videoDevices.length > 1) {
                        // 如果沒標籤但有多個鏡頭，通常後置鏡頭會在列表的後面
                        targetDeviceId = videoDevices[videoDevices.length - 1].deviceId;
                    }
                }

                // 4. 設定最終的強制參數
                const constraints = {
                    audio: false,
                    video: targetDeviceId 
                        ? { deviceId: { exact: targetDeviceId } } // 有找到主鏡頭 ID 就強行綁定
                        : { facingMode: isMobile ? "environment" : "user" } // 沒找到就用預設
                };

                // 如果是電腦，或者是被迫開了前鏡頭，才加上鏡像
                if (!targetDeviceId && (!isMobile || constraints.video.facingMode === 'user')) {
                    containerElement.classList.add('mirror');
                }

                const finalStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = finalStream;
                videoElement.addEventListener('loadedmetadata', () => { tick(); });

            } catch (err) {
                console.error("終極鏡頭獲取失敗: ", err);
                // 最底限的萬能備用
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    videoElement.srcObject = fallbackStream;
                    videoElement.addEventListener('loadedmetadata', () => { tick(); });
                } catch (fErr) {
                    alert("真的無法開啟相機，請確認是否在手機的『系統設定』中給予了瀏覽器完整相機權限！");
                }
            }
        }

        async function tick() {
            if (videoElement.readyState >= 2) {
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tick);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
