<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>靈動霓虹火柴人</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ff55;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 85, 0.15);
            transform: scaleX(-1); 
        }
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ff55;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ff55;
            box-shadow: 0 0 15px rgba(0,255,85,0.4);
        }
    </style>
</head>
<body>

    <p id="loading">表情表情系統同步中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        let latestPoseResults = null;
        let latestHandResults = null;

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(results => {
            latestPoseResults = results;
            if (loadingText) loadingText.style.display = 'none';
        });

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(results => {
            latestHandResults = results;
        });

        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowBlur = 15;
            
            // ─── 繪製身體與靈動面部 (Pose) ───
            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const landmarks = latestPoseResults.poseLandmarks;
                const w = canvasElement.width;
                const h = canvasElement.height;

                canvasCtx.shadowColor = '#00aaff'; // 軀幹與五官設為藍色霓虹
                
                // 1. 畫出雙眼與鼻子 (左眼:2, 右眼:5, 鼻子:0)
                const facePoints = [0, 2, 5];
                facePoints.forEach(index => {
                    const pt = landmarks[index];
                    if (pt && pt.visibility > 0.5) {
                        canvasCtx.beginPath();
                        canvasCtx.arc(pt.x * w, pt.y * h, 5, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#ffffff';
                        canvasCtx.fill();
                    }
                });

                // 2. 【核心新增】動態霓虹嘴巴曲線邏輯
                // Pose 模型中，11 是左嘴角，12 是右嘴角，0 是鼻子
                const leftMouth = landmarks[9];  
                const rightMouth = landmarks[10];
                const nose = landmarks[0];

                if (leftMouth && rightMouth && nose && leftMouth.visibility > 0.5 && rightMouth.visibility > 0.5) {
                    const lx = leftMouth.x * w;
                    const ly = leftMouth.y * h;
                    const rx = rightMouth.x * w;
                    const ry = rightMouth.y * h;
                    const nx = nose.x * w;
                    const ny = nose.y * h;

                    // 計算兩嘴角的中點
                    const midX = (lx + rx) / 2;
                    const midY = (ly + ry) / 2;

                    // 透過鼻子與嘴角中點的相對距離，來微調嘴巴下凹或上揚的「控制點」
                    // 這樣當你大笑、張嘴或撇嘴時，曲線會跟著動態產生弧度！
                    const controlX = midX;
                    const controlY = midY + (midY - ny) * 0.2; // 依據面部比例動態計算下巴下垂度

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(lx, ly);
                    // 畫出一條平滑的二次貝茲曲線
                    canvasCtx.quadraticCurveTo(controlX, controlY, rx, ry);
                    
                    canvasCtx.strokeStyle = '#00aaff';
                    canvasCtx.lineWidth = 4;
                    canvasCtx.lineCap = 'round';
                    canvasCtx.stroke();
                }

                // 3. 畫出身體骨架 (過濾掉原本混亂的臉部連線)
                if (typeof POSE_CONNECTIONS !== 'undefined') {
                    // 這裡只過濾保留軀幹與四肢
                    const filteredConnections = POSE_CONNECTIONS.filter(conn => conn[0] >= 11 && conn[1] >= 11);
                    drawConnectors(canvasCtx, landmarks, filteredConnections, { color: '#00aaff', lineWidth: 4 });
                }
            }

            // ─── 繪製精細手部骨架 (Hands) ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = '#00ff55'; // 手部設為綠色霓虹
                for (const landmarks of latestHandResults.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, { color: '#00ff55', lineWidth: 1, radius: 2 });
                    if (typeof HAND_CONNECTIONS !== 'undefined') {
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#ffffff', lineWidth: 2 });
                    }
                }
            }

            requestAnimationFrame(drawScene);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) {
                alert("無法開啟前置相機，請確認權限！");
            }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await pose.send({ image: videoElement });
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
