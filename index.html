<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極靈動火柴人 - 表情解鎖版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ff55;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 85, 0.15);
            transform: scaleX(-1); /* 鏡像翻轉 */
        }
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ff55;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ff55;
            box-shadow: 0 0 15px rgba(0,255,85,0.4);
        }
    </style>
</head>
<body>

    <p id="loading">高靈敏表情系統同步中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        let latestFaceResults = null;
        let latestHandResults = null;

        // 1. 初始化高精度 Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // 開啟眼瞳與嘴唇細節優化
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(results => {
            latestFaceResults = results;
            if (loadingText) loadingText.style.display = 'none';
        });

        // 2. 初始化 Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(results => {
            latestHandResults = results;
        });

        // 定義嘴唇外圈與眼框的特定關鍵點點陣，用來畫出精簡版面具
        // 這些數字對應 MediaPipe 臉部 468 個點中的特定部位
        const MOUTH_OUTLINE = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40, 185];
        const LEFT_EYE_OUTLINE = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE_OUTLINE = [362, 385, 387, 263, 373, 380];

        // 輔助繪圖函式：將指定的點連接成封閉閉合線條
        function drawPathFromIndices(ctx, landmarks, indices, color, lineWidth) {
            if (!landmarks || indices.length === 0) return;
            ctx.beginPath();
            const firstPt = landmarks[indices[0]];
            ctx.moveTo(firstPt.x * canvasElement.width, firstPt.y * canvasElement.height);
            
            for (let i = 1; i < indices.length; i++) {
                const pt = landmarks[indices[i]];
                ctx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
            }
            ctx.closePath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        // 3. 霓虹渲染迴圈
        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowBlur = 15;
            
            // ─── 繪製精簡靈動面部 (Face) ───
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks) {
                const landmarks = latestFaceResults.multiFaceLandmarks[0];
                canvasCtx.shadowColor = '#00aaff'; // 面部霓虹藍

                // 1. 畫出嘴唇外圈輪廓（這行能完美跟隨你張嘴、大笑、搞怪的形狀！）
                drawPathFromIndices(canvasCtx, landmarks, MOUTH_OUTLINE, '#00aaff', 4);

                // 2. 畫出雙眼輪廓，取代原本呆滯的圓點
                drawPathFromIndices(canvasCtx, landmarks, LEFT_EYE_OUTLINE, '#00aaff', 3);
                drawPathFromIndices(canvasCtx, landmarks, RIGHT_EYE_OUTLINE, '#00aaff', 3);

                // 3. 補上一顆鼻子核心點 (Index: 1)
                const nosePt = landmarks[1];
                if (nosePt) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(nosePt.x * canvasElement.width, nosePt.y * canvasElement.height, 4, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#ffffff';
                    canvasCtx.fill();
                }
            }

            // ─── 繪製精細手部骨架 (Hands) ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = '#00ff55'; // 手部霓虹綠
                for (const landmarks of latestHandResults.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, { color: '#00ff55', lineWidth: 1, radius: 2 });
                    if (typeof HAND_CONNECTIONS !== 'undefined') {
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#ffffff', lineWidth: 2 });
                    }
                }
            }

            requestAnimationFrame(drawScene);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) {
                alert("無法開啟相機，請確認權限！");
            }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
