<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極霓虹火柴人 - 點陣靈動版</title>
    <!-- 引入 MediaPipe 必要組件，包含 Pose 偵測 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ffcc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.2);
            transform: scaleX(-1); /* 鏡像翻轉 */
        }
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
    </style>
</head>
<body>

    <p id="loading">終極可愛火柴人系統載入中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        let latestFaceResults = null;
        let latestHandResults = null;
        let latestPoseResults = null;

        // 1. 初始化 Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(results => {
            latestFaceResults = results;
            if (loadingText) loadingText.style.display = 'none';
        });

        // 2. 初始化 Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(results => {
            latestHandResults = results;
        });

        // 3. 初始化 Pose (保留身體、肩膀與手臂)
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(results => {
            latestPoseResults = results;
        });

        // 定義左右眼外圈路徑
        const LEFT_EYE_PATH = [33, 160, 158, 133, 153, 144];
        const RIGHT_EYE_PATH = [362, 385, 387, 263, 373, 380];
        
        // 嘴唇定義：61是左嘴角，291是右嘴角
        // 下嘴唇邊緣特徵點（從左到右順序）
        const LOWER_LIP_PATH = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291];

        // 畫封闭或開放眼部路徑的輔助函式
        function drawPath(ctx, landmarks, pathIndices, closePath = true) {
            if (!landmarks || pathIndices.length === 0) return;
            ctx.beginPath();
            const firstPt = landmarks[pathIndices[0]];
            if (firstPt) ctx.moveTo(firstPt.x * canvasElement.width, firstPt.y * canvasElement.height);
            
            for (let i = 1; i < pathIndices.length; i++) {
                const pt = landmarks[pathIndices[i]];
                if (pt) ctx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
            }
            if (closePath) ctx.closePath();
            ctx.stroke();
        }

        // 4. 霓虹繪圖迴圈
        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowBlur = 12;

            // ─── 繪製可愛版面部 (眼睛 + D字型嘴巴) ───
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks && latestFaceResults.multiFaceLandmarks.length > 0) {
                const landmarks = latestFaceResults.multiFaceLandmarks[0];
                
                canvasCtx.shadowColor = '#00ffcc';
                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.lineWidth = 3;

                // 1. 畫左眼與右眼（完美眨眼）
                drawPath(canvasCtx, landmarks, LEFT_EYE_PATH, true);
                drawPath(canvasCtx, landmarks, RIGHT_EYE_PATH, true);

                // 2. 畫 D 字型可愛嘴巴（照 image_987903.png 修改）
                const leftCorner = landmarks[61];  // 左嘴角
                const rightCorner = landmarks[291]; // 右嘴角

                if (leftCorner && rightCorner) {
                    canvasCtx.beginPath();
                    // 上嘴唇：直接從左嘴角連一條平直的直線到右嘴角
                    canvasCtx.moveTo(leftCorner.x * canvasElement.width, leftCorner.y * canvasElement.height);
                    canvasCtx.lineTo(rightCorner.x * canvasElement.width, rightCorner.y * canvasElement.height);
                    
                    // 下嘴唇：順著下緣弧度的點連回去，組合成卡通大笑嘴
                    for (let i = 1; i < LOWER_LIP_PATH.length; i++) {
                        const pt = landmarks[LOWER_LIP_PATH[i]];
                        if (pt) canvasCtx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
                    }
                    canvasCtx.closePath();
                    canvasCtx.stroke();
                }
                
                // 【已移除】原本在這裡的鼻子中心點 (Landmark 1) 已經完全拿掉了！
            }

            // ─── 繪製上半身骨架 (Pose: 肩膀與手臂) ───
            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const poseLandmarks = latestPoseResults.poseLandmarks;
                canvasCtx.shadowColor = '#00ffcc'; // 身體和臉部用同色系，看起來更一體化
                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.lineWidth = 4;

                // 我們只連線火柴人的上半身（肩膀與雙臂），避開凌亂的臉部跟下半身點
                // 11:左肩, 12:右肩, 13:左肘, 14:右肘, 15:左腕, 16:右腕
                const pt11 = poseLandmarks[11];
                const pt12 = poseLandmarks[12];
                const pt13 = poseLandmarks[13];
                const pt14 = poseLandmarks[14];
                const pt15 = poseLandmarks[15];
                const pt16 = poseLandmarks[16];
                const w = canvasElement.width;
                const h = canvasElement.height;

                // 畫肩膀連線
                if (pt11 && pt12 && pt11.visibility > 0.5 && pt12.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt11.x * w, pt11.y * h);
                    canvasCtx.lineTo(pt12.x * w, pt12.y * h);
                    canvasCtx.stroke();
                }
                // 畫左手臂 (肩 -> 肘 -> 腕)
                if (pt11 && pt13 && pt15 && pt13.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt11.x * w, pt11.y * h);
                    canvasCtx.lineTo(pt13.x * w, pt13.y * h);
                    canvasCtx.lineTo(pt15.x * w, pt15.y * h);
                    canvasCtx.stroke();
                }
                // 畫右手臂 (肩 -> 肘 -> 腕)
                if (pt12 && pt14 && pt16 && pt14.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt12.x * w, pt12.y * h);
                    canvasCtx.lineTo(pt14.x * w, pt14.y * h);
                    canvasCtx.lineTo(pt16.x * w, pt16.y * h);
                    canvasCtx.stroke();
                }
            }

            // ─── 繪製精細手部 (Hands) ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = '#ff0055'; // 手部維持顯眼的霓虹桃紅
                for (const landmarks of latestHandResults.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, { color: '#ff0055', lineWidth: 1, radius: 2 });
                    const connections = window.HAND_CONNECTIONS || (typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : null);
                    if (connections) {
                        drawConnectors(canvasCtx, landmarks, connections, { color: '#ffffff', lineWidth: 2 });
                    }
                }
            }

            requestAnimationFrame(drawScene);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) {
                alert("無法開啟相機，請確認權限！");
            }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
                await pose.send({ image: videoElement }); // 同步處理身體骨架
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
