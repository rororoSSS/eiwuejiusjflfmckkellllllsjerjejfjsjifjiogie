<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 後置相機手勢辨識</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: white;
            margin: 0;
            padding: 10px;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 480px; /* 適合手機螢幕寬度 */
            margin: 10px auto;
            /* 利用 padding-top 鎖定 4:3 畫面比例，防止畫面變形 */
            padding-top: 133.33%; 
            overflow: hidden;
            border-radius: 10px;
            background-color: #000;
        }
        /* 隱藏原始 video，只顯示 canvas */
        #webcam {
            display: none;
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保影像填滿容器且不拉伸變形 */
        }
        #loading {
            font-size: 1rem;
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <h2 style="font-size: 1.5rem; margin-bottom: 5px;">後置鏡頭骨架偵測</h2>
    <p id="loading">AI 模型與主鏡頭載入中...</p>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        function onResults(results) {
            if (loadingText) {
                loadingText.style.display = 'none';
            }

            // 動態調整 canvas 的內部解析度，使其與相機輸入的實際畫質一致，避免模糊與變形
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 正常繪製影像（不進行鏡像翻轉，因為是後置鏡頭看別人的視角）
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 繪製手部骨架
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        // 初始化 MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // 啟動相機：指定使用後置鏡頭 (environment)
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            facingMode: 'environment', // 關鍵設定：強制指定後置主鏡頭
            width: 640,
            height: 480
        });
        
        camera.start().catch(err => {
            alert("無法開啟後置鏡頭，請檢查權限設定。錯誤: " + err);
        });
    </script>
</body>
</html>
