<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Pages 後置相機手勢辨識</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #000000;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止手機網頁上下橡皮筋滾動 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .video-wrapper {
            position: relative;
            width: 90vw;             /* 寬度佔滿螢幕九成 */
            height: calc(90vw * 1.333); /* 強制鎖定手機標準 3:4 直式比例，絕對不變形 */
            max-width: 480px;
            max-height: 640px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #1c1c1e;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓影像填滿容器，多餘的裁切，確保不拉伸壓扁 */
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #ffcc00;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <p id="loading">正在強制隱藏前鏡頭，開啟後置主鏡頭...</p>

    <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 初始化 MediaPipe 手部辨識
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        // 偵測結果渲染
        function onResults(results) {
            if (loadingText) loadingText.style.display = 'none';

            // 隨時修正畫布解析度，對齊影片實際輸入畫質，徹底防變形
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 注意：這裡不畫 results.image，因為底層的 <video> 已經用 object-fit: cover 完美無變形地顯示在畫面上了！
            // 我們只在 canvas 上「疊加」骨架線條即可。

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        hands.onResults(onResults);

        // 使用瀏覽器原生 MediaDevices 強制指定後置鏡頭
        async function startCamera() {
            const constraints = {
                video: {
                    // exact 代表「強烈強制」，如果沒有後置鏡頭就報錯，不允許它自動隨機切回前鏡頭
                    facingMode: { exact: "environment" }, 
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                
                // 當影片成功載入並取得尺寸時，啟動 AI 偵測迴圈
                videoElement.addEventListener('loadedmetadata', () => {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    tick();
                });
            } catch (err) {
                console.error("強制後置鏡頭失敗，嘗試放寬標準的後置鏡頭... ", err);
                // 備用方案：如果有些手機瀏覽器不支援 exact，改用一般 environment 請求
                try {
                    const backupStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" },
                        audio: false
                    });
                    videoElement.srcObject = backupStream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        canvasElement.width = videoElement.videoWidth;
                        canvasElement.height = videoElement.videoHeight;
                        tick();
                    });
                } catch (backupErr) {
                    alert("無法獲取後置主鏡頭，請確認在手機瀏覽器中允許了相機權限！");
                }
            }
        }

        // 用瀏覽器最順暢的幀率，不斷把相機畫面送給 AI 模型
        async function tick() {
            if (videoElement.readyState >= 2) {
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tick);
        }

        // 頁面載入後直接啟動
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
