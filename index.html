<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極霓虹火柴人 - 點陣靈動版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ffcc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.2);
            transform: scaleX(-1); /* 鏡像翻轉 */
        }
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
    </style>
</head>
<body>

    <p id="loading">終極表情連線系統載入中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        let latestFaceResults = null;
        let latestHandResults = null;

        // 1. 初始化 Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // 加強眼睛和嘴唇的精密偵測
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(results => {
            latestFaceResults = results;
            if (loadingText) loadingText.style.display = 'none';
        });

        // 2. 初始化 Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(results => {
            latestHandResults = results;
        });

        // 【調整：依據時鐘/逆時針方向排序的特徵點，方便直接連成線圈】
        // 嘴唇外圈連線順序
        const LIPS_PATH = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95];
        // 左眼外圈連線順序
        const LEFT_EYE_PATH = [33, 160, 158, 133, 153, 144];
        // 右眼外圈連線順序
        const RIGHT_EYE_PATH = [362, 385, 387, 263, 373, 380];

        // 輔助函式：用線段連接一組特徵點
        function drawPath(ctx, landmarks, pathIndices, closePath = true) {
            if (!landmarks || pathIndices.length === 0) return;
            
            ctx.beginPath();
            const firstPt = landmarks[pathIndices[0]];
            if (firstPt) {
                ctx.moveTo(firstPt.x * canvasElement.width, firstPt.y * canvasElement.height);
            }
            
            for (let i = 1; i < pathIndices.length; i++) {
                const pt = landmarks[pathIndices[i]];
                if (pt) {
                    ctx.lineTo(pt.x * canvasElement.width, pt.y * canvasElement.height);
                }
            }
            
            if (closePath) {
                ctx.closePath();
            }
            ctx.stroke();
        }

        // 3. 霓虹繪圖迴圈
        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            // 清除畫布，維持純黑
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowBlur = 12;

            // ─── 繪製連線面部 ───
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks && latestFaceResults.multiFaceLandmarks.length > 0) {
                const landmarks = latestFaceResults.multiFaceLandmarks[0];
                
                // 設定五官線條風格
                canvasCtx.shadowColor = '#00ffcc'; // 面部霓虹藍綠色
                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.lineWidth = 3; // 線條粗細

                // 1. 畫嘴唇連線（會隨張嘴、閉嘴即時動態伸縮縮放）
                drawPath(canvasCtx, landmarks, LIPS_PATH, true);

                // 2. 畫左眼與右眼連線（眨眼時，上下線段會閉合，完美呈現開張動作）
                drawPath(canvasCtx, landmarks, LEFT_EYE_PATH, true);
                drawPath(canvasCtx, landmarks, RIGHT_EYE_PATH, true);

                // 3. 畫一個亮白色的鼻子中心點（保留作為點綴）
                const nose = landmarks[1];
                if (nose) {
                    canvasCtx.shadowColor = '#ffffff';
                    canvasCtx.fillStyle = '#ffffff';
                    canvasCtx.beginPath();
                    canvasCtx.arc(nose.x * canvasElement.width, nose.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fill();
                }
            }

            // ─── 繪製精細手部骨架 (Hands) ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = '#ff0055'; // 手部換個對比色：霓虹桃紅
                for (const landmarks of latestHandResults.multiHandLandmarks) {
                    // 繪製手部關節點
                    drawLandmarks(canvasCtx, landmarks, { color: '#ff0055', lineWidth: 1, radius: 2 });
                    
                    // 修正：安全地引用 MediaPipe 的手部連線常數
                    const connections = window.HAND_CONNECTIONS || (typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : null);
                    if (connections) {
                        drawConnectors(canvasCtx, landmarks, connections, { color: '#ffffff', lineWidth: 2 });
                    }
                }
            }

            requestAnimationFrame(drawScene);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) {
                alert("無法開啟相機，請確認權限！");
            }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
