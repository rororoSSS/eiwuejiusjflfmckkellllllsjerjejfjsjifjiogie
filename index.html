<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨平台手勢辨識 - 完美比例版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #121214;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; /* 保持你剛剛滿意的完美比例 */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #1c1c1e;
        }
        /* 只有在使用前鏡頭(自拍/筆電)時才需要鏡像，後置鏡頭不要鏡像 */
        .mirror {
            transform: scaleX(-1);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 填滿容器，多餘裁切，保證畫面絕不壓扁變形 */
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #ffcc00;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <p id="loading">AI 模型與鏡頭載入中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 初始化 MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        function onResults(results) {
            if (loadingText) loadingText.style.display = 'none';

            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        hands.onResults(onResults);

        async function startCamera() {
            // 偵測是否為手機/平板
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            
            // 關鍵改動：溫和地請求 environment (後置) 或 user (前置)
            const constraints = {
                video: {
                    facingMode: isMobile ? "environment" : "user", 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                
                // 檢查實際開啟的鏡頭是否為前置，若是前置（如筆電）才加上鏡像反轉
                // 這樣可以確保手機後置鏡頭拍別人時，方向是正確的
                setTimeout(() => {
                    const track = stream.getVideoTracks()[0];
                    const settings = track.getSettings();
                    if (settings.facingMode === 'user' || !isMobile) {
                        containerElement.classList.add('mirror');
                    }
                }, 500);

                videoElement.addEventListener('loadedmetadata', () => {
                    tick();
                });
            } catch (err) {
                console.error("相機開啟失敗，嘗試最終備用方案", err);
                try {
                    // 萬能備用方案：抓到什麼鏡頭就用什麼
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = fallbackStream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        tick();
                    });
                } catch (finalErr) {
                    alert("無法獲取相機，請檢查瀏覽器的相機權限設定！");
                }
            }
        }

        async function tick() {
            if (videoElement.readyState >= 2) {
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tick);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
