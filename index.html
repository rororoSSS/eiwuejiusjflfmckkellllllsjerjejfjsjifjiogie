<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 電腦版手勢辨識</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h2 {
            margin-bottom: 20px;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px; /* 電腦版標準寬度 */
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
            
            /* 關鍵：透過鏡像翻轉整個容器，讓視訊畫面與骨架一起像照鏡子一樣自然 */
            transform: scaleX(-1); 
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain; /* 確保影片依原始比例縮放，絕不拉伸變形 */
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>筆電鏡頭 骨架即時偵測 (電腦版)</h2>
    <p id="loading">AI 模型載入中，請允許網頁開啟相機...</p>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 初始化 MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // AI 偵測結果回傳
        function onResults(results) {
            if (loadingText) loadingText.style.display = 'none';

            // 確保畫布解析度與影片實際解析度完全一模一樣，防止骨架錯位或變形
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 這裡同樣不重複畫 results.image，直接讓底層 <video> 顯示，畫布只疊加線條
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // 畫關節點 (紅色)
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    // 畫連接線 (綠色)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        hands.onResults(onResults);

        // 啟動電腦相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user", // 使用前置/筆電鏡頭
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                videoElement.srcObject = stream;
                
                videoElement.addEventListener('loadedmetadata', () => {
                    tick();
                });
            } catch (err) {
                alert("無法開啟筆電鏡頭，請確認是否給予瀏覽器相機權限！錯誤: " + err);
            }
        }

        // 偵測迴圈
        async function tick() {
            if (videoElement.readyState >= 2) {
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(tick);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
