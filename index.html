<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極動態捕捉 - 臉部與手部</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: #000000; /* 純黑背景，更有科技感 */
            color: #00ffcc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; /* 維持你最滿意的完美比例 */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            background-color: #050505;
            
            /* 自拍鏡頭（前置）必備：左右鏡像翻轉，才像照鏡子一樣自然 */
            transform: scaleX(-1); 
        }
        /* 核心關鍵：徹底隱藏原始相機影像 */
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
    </style>
</head>
<body>

    <p id="loading">終極動態捕捉模型載入中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 1. 初始化 MediaPipe Holistic 模型 (全方位偵測)
        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 2. 收到 AI 結果時的繪圖邏輯
        function onResults(results) {
            if (loadingText) loadingText.style.display = 'none';

            // 隨時校正內部解析度
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            // 清除上一影格，保持全黑背景
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 【超級關鍵】這裡完全不呼叫 canvasCtx.drawImage()，所以背景會維持純黑！

            // ─── 繪製臉部網格 (Face Mesh) ───
            if (results.faceLandmarks) {
                drawLandmarks(canvasCtx, results.faceLandmarks, {
                    color: '#00ffcc', 
                    lineWidth: 0.5, // 臉部點很多，細線條才精緻
                    radius: 0.5
                });
                // 如果你想連臉部的線都畫出來，可以解開下一行的註釋（但畫面會比較滿）：
                // drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#00ffcc', lineWidth: 0.5});
            }

            // ─── 繪製左手骨架 ───
            if (results.leftHandLandmarks) {
                drawLandmarks(canvasCtx, results.leftHandLandmarks, {color: '#ff0055', lineWidth: 2, radius: 3});
                drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
            }

            // ─── 繪製右手骨架 ───
            if (results.rightHandLandmarks) {
                drawLandmarks(canvasCtx, results.rightHandLandmarks, {color: '#00ff55', lineWidth: 2, radius: 3});
                drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 3});
            }

            canvasCtx.restore();
        }

        holistic.onResults(onResults);

        // 3. 啟動自拍相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "user", // 認命使用自拍/筆電鏡頭
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    tick();
                });
            } catch (err) {
                alert("無法獲取鏡頭，請確認已允許相機權限！");
            }
        }

        async function tick() {
            if (videoElement.readyState >= 2) {
                await holistic.send({ image: videoElement });
            }
            requestAnimationFrame(tick);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
