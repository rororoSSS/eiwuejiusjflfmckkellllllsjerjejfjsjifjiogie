<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>終極霓虹火柴人 - 卡通線條版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #000000;
            color: #00ffcc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 3 / 4; 
            border-radius: 20px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.2);
            transform: scaleX(-1); /* 鏡像翻轉 */
        }
        #webcam {
            display: none; 
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        #loading {
            position: absolute;
            z-index: 3;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }
    </style>
</head>
<body>

    <p id="loading">動態卡通火柴人系統載入中...</p>

    <div id="container" class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const containerElement = document.getElementById('container');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        let latestFaceResults = null;
        let latestHandResults = null;
        let latestPoseResults = null;

        // 1. 初始化 Face Mesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(results => {
            latestFaceResults = results;
            if (loadingText) loadingText.style.display = 'none';
        });

        // 2. 初始化 Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(results => {
            latestHandResults = results;
        });

        // 3. 初始化 Pose
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        pose.onResults(results => {
            latestPoseResults = results;
        });

        // 計算兩點距離的輔助函式
        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        // 4. 霓虹繪圖迴圈
        function drawScene() {
            if (canvasElement.width !== videoElement.videoWidth && videoElement.videoWidth > 0) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                containerElement.style.aspectRatio = `${videoElement.videoWidth} / ${videoElement.videoHeight}`;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.shadowBlur = 15;

            const w = canvasElement.width;
            const h = canvasElement.height;

            // ─── 繪製五官（線條化 & 卡通化） ───
            if (latestFaceResults && latestFaceResults.multiFaceLandmarks && latestFaceResults.multiFaceLandmarks.length > 0) {
                const landmarks = latestFaceResults.multiFaceLandmarks[0];
                
                canvasCtx.shadowColor = '#00ffcc';
                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.fillStyle = '#00ffcc';
                canvasCtx.lineWidth = 4;
                canvasCtx.lineCap = 'round';

// --- 眼睛偵測與繪製（修正放大版） ---
                // 左眼：33(外角), 133(內角), 159(上瞼), 145(下瞼)
                // 右眼：362(內角), 263(外角), 386(上瞼), 374(下瞼)
                const leftOuter = landmarks[33], leftInner = landmarks[133], leftTop = landmarks[159], leftBottom = landmarks[145];
                const rightInner = landmarks[362], rightOuter = landmarks[263], rightTop = landmarks[386], rightBottom = landmarks[374];

                // 1. 左眼繪製
                if (leftOuter && leftInner && leftTop && leftBottom) {
                    // 計算眼睛中心點 (x 和 y 的平均值)
                    const centerX = (leftOuter.x + leftInner.x) / 2 * w;
                    const centerY = (leftOuter.y + leftInner.y) / 2 * h;
                    const eyeDist = getDistance(leftTop, leftBottom);

                    if (eyeDist > 0.015) { 
                        // 睜眼：這裡的 18 就是圓圈大小，改成 25 或 30 就會超級大！
                        canvasCtx.beginPath();
                        canvasCtx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    } else { 
                        // 眨眼：一條橫線
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(centerX - 20, centerY);
                        canvasCtx.lineTo(centerX + 20, centerY);
                        canvasCtx.stroke();
                    }
                }

                // 2. 右眼繪製
                if (rightOuter && rightInner && rightTop && rightBottom) {
                    // 計算眼睛中心點
                    const centerX = (rightOuter.x + rightInner.x) / 2 * w;
                    const centerY = (rightOuter.y + rightInner.y) / 2 * h;
                    const eyeDist = getDistance(rightTop, rightBottom);

                    if (eyeDist > 0.015) { 
                        // 睜眼：右眼大小，記得跟左眼一樣大
                        canvasCtx.beginPath();
                        canvasCtx.arc(centerX, centerY, 18, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    } else { 
                        // 眨眼：一條橫線
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(centerX - 20, centerY);
                        canvasCtx.lineTo(centerX + 20, centerY);
                        canvasCtx.stroke();
                    }
                }

                // --- 嘴巴改為單條微笑彎線（修正上移可愛版） ---
                const leftCorner = landmarks[61];   // 左嘴角
                const rightCorner = landmarks[291]; // 右嘴角
                const bottomLip = landmarks[17];    // 下嘴唇下緣中心
                
                // 為了參考眼睛的高度，我們抓剛剛計算好的眼睛基準點（或是直接抓眼睛特徵點）
                const leftEyeY = landmarks[133] ? landmarks[133].y : 0.4; 

                if (leftCorner && rightCorner && bottomLip) {
                    // 【黃金上移係數】0.3 代表把嘴巴往眼睛的方向拉近 30%
                    // 如果想讓嘴巴再往上移更多，可以把 0.3 改成 0.4 或 0.5！
                    const shiftFactor = 0.4; 

                    // 計算上移後的全新 Y 座標
                    const newLeftY = (leftCorner.y - (leftCorner.y - leftEyeY) * shiftFactor) * h;
                    const newRightY = (rightCorner.y - (rightCorner.y - leftEyeY) * shiftFactor) * h;
                    const newBottomY = (bottomLip.y - (bottomLip.y - leftEyeY) * shiftFactor) * h;

                    canvasCtx.beginPath();
                    // 從上移後的左嘴角出發
                    canvasCtx.moveTo(leftCorner.x * w, newLeftY);
                    // 利用上移後的下嘴唇中心作為控制點，畫出完美的微笑曲線到右嘴角
                    canvasCtx.quadraticCurveTo(bottomLip.x * w, newBottomY, rightCorner.x * w, newRightY);
                    canvasCtx.stroke();
                }
            }

            // ─── 繪製身體骨架（肩膀與手臂） ───
            if (latestPoseResults && latestPoseResults.poseLandmarks) {
                const poseLandmarks = latestPoseResults.poseLandmarks;
                canvasCtx.shadowColor = '#00ffcc';
                canvasCtx.strokeStyle = '#00ffcc';
                canvasCtx.lineWidth = 5;

                const pt11 = poseLandmarks[11]; // 左肩
                const pt12 = poseLandmarks[12]; // 右肩
                const pt13 = poseLandmarks[13]; // 左肘
                const pt14 = poseLandmarks[14]; // 右肘
                const pt15 = poseLandmarks[15]; // 左腕
                const pt16 = poseLandmarks[16]; // 右腕

                // 畫肩膀
                if (pt11 && pt12 && pt11.visibility > 0.5 && pt12.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt11.x * w, pt11.y * h);
                    canvasCtx.lineTo(pt12.x * w, pt12.y * h);
                    canvasCtx.stroke();
                }
                // 左手臂
                if (pt11 && pt13 && pt15 && pt13.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt11.x * w, pt11.y * h);
                    canvasCtx.lineTo(pt13.x * w, pt13.y * h);
                    canvasCtx.lineTo(pt15.x * w, pt15.y * h);
                    canvasCtx.stroke();
                }
                // 右手臂
                if (pt12 && pt14 && pt16 && pt14.visibility > 0.5) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(pt12.x * w, pt12.y * h);
                    canvasCtx.lineTo(pt14.x * w, pt14.y * h);
                    canvasCtx.lineTo(pt16.x * w, pt16.y * h);
                    canvasCtx.stroke();
                }
            }

            // ─── 繪製手部（只留骨架線，完全不畫任何點！） ───
            if (latestHandResults && latestHandResults.multiHandLandmarks) {
                canvasCtx.shadowColor = '#ff0055'; 
                canvasCtx.strokeStyle = '#ffffff'; // 手部線條用純白，搭配粉紅霓虹發光
                canvasCtx.lineWidth = 3;

                const connections = window.HAND_CONNECTIONS || (typeof HAND_CONNECTIONS !== 'undefined' ? HAND_CONNECTIONS : null);
                
                if (connections) {
                    for (const landmarks of latestHandResults.multiHandLandmarks) {
                        // 我們在這裡不用 drawLandmarks (因為它會畫點)，改用自訂的純線條繪製
                        for (const connection of connections) {
                            const firstPt = landmarks[connection[0]];
                            const secondPt = landmarks[connection[1]];
                            if (firstPt && secondPt) {
                                canvasCtx.beginPath();
                                canvasCtx.moveTo(firstPt.x * w, firstPt.y * h);
                                canvasCtx.lineTo(secondPt.x * w, secondPt.y * h);
                                canvasCtx.stroke();
                            }
                        }
                    }
                }
            }

            requestAnimationFrame(drawScene);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    drawScene();
                    tickAI();
                });
            } catch (err) {
                alert("無法開啟相機，請確認權限！");
            }
        }

        async function tickAI() {
            if (videoElement.readyState >= 2) {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
                await pose.send({ image: videoElement });
            }
            requestAnimationFrame(tickAI);
        }

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
