<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 手部骨架辨識</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1c1c1e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 20px auto;
        }
        /* 隱藏原始影像，我們只看畫有骨架的畫布 */
        #webcam {
            display: none;
        }
        #output_canvas {
            transform: scaleX(-1); /* 鏡像翻轉，讓畫面跟照鏡子一樣自然 */
            width: 100%;
            height: 100%;
            background-color: #000;
            border-radius: 10px;
        }
        #loading {
            font-size: 1.2rem;
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <h1>MediaPipe 手部骨架即時偵測</h1>
    <p id="loading">AI 模型載入中，請稍候...</p>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 當 AI 辨識出結果時的「繪圖邏輯」
        function onResults(results) {
            // 隱藏載入中文字
            if (loadingText) {
                loadingText.style.display = 'none';
            }

            // 清除畫布並重新繪製當前影像
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 如果有偵測到手，就把骨架畫上去
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // 畫關節點
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                    // 畫連接線
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                }
            }
            canvasCtx.restore();
        }

        // 初始化 MediaPipe Hands 模型
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // 模型參數設定
        hands.setOptions({
            maxNumHands: 2,             // 最多偵測兩隻手
            modelComplexity: 1,         // 模型複雜度 (0輕量, 1中等)
            minDetectionConfidence: 0.5, // 偵測連貫性信心門檻
            minTrackingConfidence: 0.5   // 追蹤信心門檻
        });

        hands.onResults(onResults);

        // 啟動相機並將畫面不斷丟給 AI 模型處理
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
